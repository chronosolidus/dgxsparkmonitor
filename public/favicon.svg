<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="50%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00ccff"/>
    </linearGradient>
  </defs>
  <!-- Dark background circle for contrast on light browser themes -->
  <circle cx="16" cy="16" r="15" fill="#0a0a14" stroke="#00ffff" stroke-width="1" opacity="0.9"/>
  <!-- Bold diamond/spark shape - fills most of the space -->
  <polygon points="16,2 28,16 16,30 4,16" fill="url(#spark)" filter="url(#glow)" opacity="0.95"/>
  <!-- Inner highlight for depth -->
  <polygon points="16,7 24,16 16,25 8,16" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.5" fill="#ffffff" opacity="0.9"/>
</svg>